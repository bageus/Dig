name: Apply Stage 2 Production Patch

on:
  push:
    branches:
      - feature/authoritative-xyz-stage2-production
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: feature/authoritative-xyz-stage2-production
          fetch-depth: 0

      - name: Decode, validate and apply authoritative XYZ patch
        shell: bash
        run: |
          set -u
          diagnostic=.stage2-patch/diagnostics.txt
          encoded=/tmp/stage2.patch.b64
          archive=/tmp/stage2.patch.xz
          patch=/tmp/stage2.patch
          : > "$diagnostic"
          cat .stage2-patch/chunk0 .stage2-patch/chunk1 .stage2-patch/chunk2 .stage2-patch/chunk3 > "$encoded"
          echo "encoded_bytes=$(wc -c < "$encoded")" >> "$diagnostic"
          echo "encoded_sha256=$(sha256sum "$encoded" | awk '{print $1}')" >> "$diagnostic"

          base64 -d "$encoded" > "$archive" 2>> "$diagnostic"
          base64_status=$?
          echo "base64_status=$base64_status" >> "$diagnostic"

          xz -t "$archive" 2>> "$diagnostic"
          xz_status=$?
          echo "xz_status=$xz_status" >> "$diagnostic"

          if [ "$base64_status" -eq 0 ] && [ "$xz_status" -eq 0 ]; then
            xz -dc "$archive" > "$patch"
            echo "patch_bytes=$(wc -c < "$patch")" >> "$diagnostic"
            echo "patch_sha256=$(sha256sum "$patch" | awk '{print $1}')" >> "$diagnostic"
            git apply --check "$patch" >> "$diagnostic" 2>&1
            apply_status=$?
          else
            apply_status=99
          fi
          echo "apply_status=$apply_status" >> "$diagnostic"

          if [ "$base64_status" -ne 0 ] || [ "$xz_status" -ne 0 ] || [ "$apply_status" -ne 0 ]; then
            git add "$diagnostic"
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -m 'Record Stage 2 patch diagnostics'
            git push origin HEAD:feature/authoritative-xyz-stage2-production
            exit 1
          fi

          rm -f "$diagnostic"
          git apply --index "$patch"

      - name: Remove temporary Stage 2 payload
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .stage2-patch
          rm -f docs/implementation/stage2-v3-pr-placeholder.md
          rm -f docs/implementation/stage2-v3-working-note.md
          git add -A
          git status --short

      - name: Commit production migration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit --no-verify -m 'Implement authoritative XYZ gameplay model'
          git push origin HEAD:feature/authoritative-xyz-stage2-production
