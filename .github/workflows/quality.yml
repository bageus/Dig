name: Quality

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  migrate-unity-csharp9:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'agent/unity-csharp9-compatibility' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Convert source to C# 9
        run: python tools/migrations/convert_to_unity_csharp9.py

      - name: Commit migration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Directory.Build.props src tests unity
          if git diff --cached --quiet; then
            echo "No migration changes were required."
            exit 0
          fi
          git commit -m "Convert source to Unity-compatible C# 9"
          git push origin HEAD:${{ github.head_ref }}

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run architecture and file-size checks
        run: python tools/quality/check_quality.py

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Dig.sln

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          dotnet build Dig.sln --configuration Release --no-restore 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Test
        run: dotnet test Dig.sln --configuration Release --no-build --verbosity normal

      - name: Run headless smoke test
        run: dotnet run --project src/Dig.Headless/Dig.Headless.csproj --configuration Release --no-build

      - name: Run standard deterministic soak
        run: >-
          dotnet run --project src/Dig.Headless/Dig.Headless.csproj
          --configuration Release --no-build --
          --soak --profile standard
          --report soak-report-standard.json

      - name: Run large settlement deterministic soak
        run: >-
          dotnet run --project src/Dig.Headless/Dig.Headless.csproj
          --configuration Release --no-build --
          --soak --profile large
          --report soak-report-large.json

      - name: Upload standard soak report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-report-standard
          path: soak-report-standard.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload large soak report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-report-large
          path: soak-report-large.json
          if-no-files-found: warn
          retention-days: 14
