name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run architecture, file-size and C# compatibility checks
        run: python tools/quality/check_quality.py

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Dig.sln

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          dotnet build Dig.sln --configuration Release --no-restore 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Test
        run: dotnet test Dig.sln --configuration Release --no-build --verbosity normal

      - name: Run headless smoke test
        run: dotnet run --project src/Dig.Headless/Dig.Headless.csproj --configuration Release --no-build

      - name: Run standard deterministic soak
        run: >-
          dotnet run --project src/Dig.Headless/Dig.Headless.csproj
          --configuration Release --no-build --
          --soak --profile standard
          --report soak-report-standard.json

      - name: Run large settlement deterministic soak
        run: >-
          dotnet run --project src/Dig.Headless/Dig.Headless.csproj
          --configuration Release --no-build --
          --soak --profile large
          --report soak-report-large.json

      - name: Upload standard soak report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-report-standard
          path: soak-report-standard.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload large soak report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soak-report-large
          path: soak-report-large.json
          if-no-files-found: warn
          retention-days: 14
