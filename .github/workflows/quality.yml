name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run architecture and file-size checks
        run: python tools/quality/check_quality.py

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Dig.sln

      - name: Build
        run: dotnet build Dig.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Dig.sln --configuration Release --no-build --verbosity normal
