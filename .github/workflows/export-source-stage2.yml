name: Export Source Stage 2

on:
  push:
    branches:
      - feature/authoritative-xyz-stage2
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pack source tree
        run: tar --exclude=.git -czf dig-stage2-source.tgz .

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: dig-stage2-source
          path: dig-stage2-source.tgz
          retention-days: 1
